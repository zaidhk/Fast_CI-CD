global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "cicd-api"
    static_configs:
      - targets: ["api:8000"]
        labels:
          environment: "staging"
          project: "cicd-demo"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
