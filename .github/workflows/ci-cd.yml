name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  STAGING_PORT: 8081

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase owner for Docker
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Stage 1 - Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stage 2 - Lint (flake8)
        run: |
          pip install -r requirements.txt
          flake8 app/ --max-line-length=120 --count

      - name: Stage 3 - Build & Test
        run: |
          pip install -r requirements.txt
          cd app
          python -m pytest test_main.py --cov=. --cov-report=xml:../coverage.xml --cov-report=term -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

      - name: Stage 4 - SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.organization=zaidhk
            -Dsonar.projectKey=zaidhk_Fast_CI-CD
            -Dsonar.sources=app/
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.scanner.automaticAnalysis=false

      - name: Stage 5 - Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
          timeoutSeconds: 300

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/${{ env.OWNER_LC }}/cicd-api:latest,ghcr.io/${{ env.OWNER_LC }}/cicd-api:${{ github.sha }}

      - name: Stage 6 - Security Scan (Trivy)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/cicd-api:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Stage 7 - Push Docker image
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/cicd-api:latest,ghcr.io/${{ env.OWNER_LC }}/cicd-api:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Stage 8 - IaC Apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve \
            -var="docker_image=ghcr.io/${{ env.OWNER_LC }}/cicd-api:latest" \
            -var="staging_port=${{ env.STAGING_PORT }}"

      - name: Stage 9 - Smoke Test
        run: |
          sleep 5
          curl -sf http://localhost:${{ env.STAGING_PORT }}/health || exit 1
          echo "Smoke test passed: staging is healthy"

      - name: Cleanup staging
        if: always()
        run: |
          cd infra
          terraform destroy -auto-approve \
            -var="docker_image=ghcr.io/${{ env.OWNER_LC }}/cicd-api:latest" \
            -var="staging_port=${{ env.STAGING_PORT }}"
