name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/cicd-api
  STAGING_PORT: 8081

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Stage 1 - Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stage 2 - Lint (flake8)
        run: |
          pip install -r requirements.txt
          flake8 app/ --max-line-length=120 --count

      - name: Stage 3 - Build & Test
        run: |
          pip install -r requirements.txt
          cd app
          python -m pytest test_main.py --cov=. --cov-report=xml:../coverage.xml --cov-report=term -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

      - name: Stage 4 - SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_cicd-api
            -Dsonar.sources=app/
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Stage 5 - Quality Gate
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Stage 6 - Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Stage 7 - Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Stage 8 - IaC Apply
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve \
            -var="docker_image=${{ env.DOCKER_IMAGE }}:latest" \
            -var="staging_port=${{ env.STAGING_PORT }}"

      - name: Stage 9 - Smoke Test
        run: |
          sleep 5
          curl -sf http://localhost:${{ env.STAGING_PORT }}/health || exit 1
          echo "Smoke test passed: staging is healthy"

      - name: Cleanup staging
        if: always()
        run: |
          cd infra
          terraform destroy -auto-approve \
            -var="docker_image=${{ env.DOCKER_IMAGE }}:latest" \
            -var="staging_port=${{ env.STAGING_PORT }}"
